<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>JSON Example Timeline</title>
		<meta name="description" content="TimelineJS example">

		<style>
			html, body {
				height:100%;
				padding: 0px;
				margin: 0px;
			}
			#timeline-embed{
				margin:0px !important;
				border:0px solid #CCC !important;
				padding:0px !important;
				-webkit-border-radius:0px !important;
				-moz-border-radius:0px !important;
				border-radius:0px !important;
				-moz-box-shadow:0 0px 0px rgba(0, 0, 0, 0.25) !important;
				-webkit-box-shadow:0 0px 0px rgba(0, 0, 0, 0.25) !important;
				box-shadow:0px 0px 0px rgba(0, 0, 0, 0.25) !important;
			}
			
		</style>
		
	</head>

	<body>
                <script>
                  var timeline_config = {};
                  var timeline_categories = {
                    'category1':true, 
                    'category2':true,
                    'category3':true
                  };

                  function loadTimeline(dataFile) {
                    window.timeline_config = {
                      width: 	"100%",
                      height: "100%",
                      source: dataFile,
                      //start_at_end:	true,					//OPTIONAL
                      //hash_bookmark: true,					//OPTIONAL
                      css: 	'../compiled/css/timeline.css',	//OPTIONAL
                      js: 	'../compiled/js/timeline.js'	//OPTIONAL
                    };

                    var scriptNode = document.getElementById('drawTimeline');
                    if (scriptNode) {
                      scriptNode.parentNode.removeChild(scriptNode);
                    }

                    scriptNode = document.createElement('script');
                    scriptNode.setAttribute('id', 'drawTimeline');
                    scriptNode.setAttribute('src', '../compiled/js/timeline-embed.js');
                    document.body.appendChild(scriptNode);
                  }

                  function arrayRemove(arr, item) {
                    for (var i = 0; i < arr.length; i++) {
                      if (arr[i] === item) {
                        arr.splice(i, 1);
                        return;
                      }
                    }
                  }

                  function inArray(arr, item) {
                    for (var i = 0; i < arr.length; i++) {
                      if (arr[i] === item) {
                        return true;
                      }
                    }

                    return false;
                  }

                  function changeCategoryHandler(checkbox) {
                    timeline_categories[checkbox.value] = checkbox.checked;
                    loadTimeline('example_json.json');
                  }
                </script>

		<!-- BEGIN Timeline Embed -->
                <div id="selection">
                  <label><input id="category1" type="checkbox" name="category"
                    checked="true"
                    value="category1" onchange="changeCategoryHandler(this)" />Category1</label>

                  <label><input id="category2" type="checkbox" name="category2" 
                    checked="true"
                    value="category2" onchange="changeCategoryHandler(this)" />Category2</label>

                  <label><input id="category3" type="checkbox" name="category3" 
                    checked="true"
                    value="category3" onchange="changeCategoryHandler(this)" />Category3</label>
                </div>
		<div id="timeline-embed"></div>

                <script>
                  loadTimeline('example_json.json');
                </script>
		<!-- END Timeline Embed -->
	</body>
</html>
